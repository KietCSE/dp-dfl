dataset:
  name: mnist
  split:
    mode: iid
    alpha: 0.5

model:
  name: mlp
  hidden_size: 100

topology:
  n_nodes: 20
  n_attackers: 0
  n_neighbors: 10
  seed: 42

training:
  n_rounds: 30
  local_epochs: 1
  batch_size: 64
  lr: 0.01
  n_workers: 5

dp:
  noise_mode: none            # No DP — plain FedAvg

# attack:
#   type: scale
#   scale_factor: 3.0

aggregation:
  type: simple_avg            # FedAvg = simple averaging, no defense
  params: {}

output_dir: ./results
device: auto
seed: 42
