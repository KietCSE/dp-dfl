dataset:
  name: mnist
  split:
    mode: iid
    samples_per_node: 1200    # each node draws 3000 random samples from 60k pool (overlap)
    alpha: 1.0                # ignored in iid mode

model:
  name: mlp
  hidden_size: 100

topology:
  n_nodes: 50
  n_attackers: 0          # 40% Byzantine
  n_neighbors: 30
  seed: 42

training:
  n_rounds: 100
  local_epochs: 1
  batch_size: 64
  lr: 0.01
  n_workers: 5

dp:
  noise_mode: none        # noise-game self-manages strategic noise injection
  clip_bound: 2.0
  delta: 1.0e-5
  epsilon_max: 100000000.0
  accountant_params:
    alpha_list: [1.01, 1.05, 1.1, 1.25, 1.5, 1.75, 2, 2.5, 3, 4, 5, 6, 8, 10, 12, 16, 20, 32, 50, 64, 100, 128, 256, 512, 1000]
  sampling_rate: 1.0  # Poisson client subsampling: 1.0 = all clients/round, <1 = sampled

attack:
  type: scale
  scale_factor: -10.0     # standardized across all fast-experiment configs
  start_round: 20         # clean rounds 0-19, attack activates at round 20

aggregation:
  type: krum
  params: {}

noise_game:
  alpha_attack: 0.5
  sigma_0: 1.0
  svd_rank: 16
  svd_reshape_k: 64
  momentum_beta: 0.9
  ema_gamma: 0.9
  anneal_kappa: 0.02
  align_tau: 0.1
  scaffold: true
  two_track: true
  two_track_lambda: 0.7
  beta_strat: 0.5
  sigma_total: 3.0
  rdp_alpha: 2.0
  nsr_warn: 5.0

output_dir: ./results
device: auto
seed: 42
