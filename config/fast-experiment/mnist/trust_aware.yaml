dataset:
  name: mnist
  split:
    mode: dirichlet
    alpha: 0.3            # non-IID — harder setting

model:
  name: mlp
  hidden_size: 100

topology:
  n_nodes: 20
  n_attackers: 8          # 40% Byzantine
  n_neighbors: 10
  seed: 42

training:
  n_rounds: 100
  local_epochs: 1
  batch_size: 64
  lr: 0.01
  n_workers: 1

dp:
  noise_mode: none        # trust-aware self-manages per-neighbor bounded Gaussian noise
  delta: 1.0e-5
  epsilon_max: 100000000.0
  accountant_params:
    alpha_list: [1.01, 1.05, 1.1, 1.25, 1.5, 1.75, 2, 2.5, 3, 4, 5, 6, 8, 10, 12, 16, 20, 32, 50, 64, 100, 128, 256, 512, 1000]

attack:
  type: scale
  scale_factor: 3.0
  start_round: 20         # clean rounds 0-19, attack activates at round 20

aggregation:
  type: trust_aware_d2b
  params: {}

trust:
  trust_init: 0.5
  ema_lambda: 0.8
  rho_min: 0.1
  rho_max: 5.0
  beta: 0.01
  gamma_penalty: 0.5
  gamma_z: 3.0
  sigma_floor_z: 0.0001
  alpha_drop: 2.0
  sigma_floor_drop: 0.001
  clip_window: 3
  temporal_window: 5
  eta: 0.1

output_dir: ./results
device: auto
seed: 42
