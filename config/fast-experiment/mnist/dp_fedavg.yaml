# DFL DP-FedAvg standard baseline — matches Trust-Aware/Noise-Game/CFL-FedAvg topology
# for apples-to-apples comparison in paper experiments.
#
# Result expectation: acc ~17-25% at ε=16 — this LOW number is the baseline
# evidence that plain DFL post-training DP collapses under sparse mesh, motivating
# Trust-Aware (per-layer adaptive clip) and Noise-Game (strategic noise) defenses.
#
# Knobs already proven NOT to fix the collapse (kept as comments for reference):
#   - n_neighbors=200 + T=100: only 36% acc (k=21 still too sparse)
#   - n_neighbors=250 + ε=100: 36% saturate (per-round noise dominates)
#   - clip_bound=measured_median: loss explodes (per-coord σ destroys params)
# → Plain DP-FedAvg needs algorithmic upgrades, not hyperparameter tuning.

dataset:
  name: femnist
  split:
    mode: iid
    samples_per_node: 12000      # match noise_game.yaml / cfl_fedavg_eps2.yaml
    alpha: 1.0

model:
  name: mlp
  hidden_size: 200               # match noise_game.yaml — smaller D for DP friendliness

topology:
  n_nodes: 50                   # match other DFL experiments in paper
  n_attackers: 0                # clean run — no attack, only DP noise effect
  n_neighbors: 30               # sparse mesh — realistic DFL topology
  seed: 42

training:
  n_rounds: 50                  # match other algos for fair comparison
  local_epochs: 1
  batch_size: 64
  lr: 0.01                     # match cfl_fedavg_eps2 / noise_game
  n_workers: 5
  use_vectorized: true          # vmap path: ~30x speedup on GPU vs ThreadPool
  vmap_chunk: 0                 # 0 = no chunking (50 nodes × MLP-32 trivially fits)

dp:
  noise_mode: post_training     # User-level DP: train SGD → clip update → noise
  # NOTE: measured median grad norm = 0.10, BUT clipping at median causes
  # loss explosion (per-round agg noise norm 5.79 vs param scale ~0.5).
  # Empirical stability requires tight clip 0.0234 — sacrificing signal to
  # bound absolute noise. This is the "stability over signal" trade-off
  # documented in DP-FedAvg literature for sparse-mesh DFL.
  # Result at this setting: ε=16, acc≈18% (baseline collapse — paper data point).
  clip_bound: 0.0234            # tight for stability (NOT median); 4× tighter than median
  # noise_mult solved via: python scripts/solve_noise_mult.py 16 50 0.5
  # → z=1.45 at T=50, q=0.5, ε=16, δ=1e-5
  noise_mult: 1.45              # gives ε≈16 over 50 rounds
  delta: 1.0e-5
  epsilon_max: 16.5             # safety cap above target
  accountant: renyi_dpsgd
  accountant_params:
    alpha_list: [1.01, 1.05, 1.1, 1.25, 1.5, 1.75, 2, 2.5, 3, 4, 5, 6, 8, 10, 12, 16, 20, 32, 50, 64, 100, 128, 256, 512, 1000]
  sampling_rate: 0.5            # match other DFL experiments

attack:
  type: scale
  scale_factor: -10.0
  start_round: 99               # never activates within 50 rounds — clean baseline

aggregation:
  type: fedavg                  # FedAvg = weighted average by dataset proportion
  params: {}

output_dir: ./results
device: auto
seed: 42
