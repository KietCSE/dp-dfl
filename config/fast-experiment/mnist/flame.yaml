dataset:
  name: mnist
  split:
    mode: dirichlet
    alpha: 0.3            # non-IID — harder setting

model:
  name: mlp
  hidden_size: 100

topology:
  n_nodes: 20
  n_attackers: 8          # 40% Byzantine
  n_neighbors: 10
  seed: 42

training:
  n_rounds: 100
  local_epochs: 1
  batch_size: 64
  lr: 0.01
  n_workers: 5

dp:
  noise_mode: none        # FLAME self-manages DP noise via aggregation.params
  sampling_rate: 1.0  # Poisson client subsampling: 1.0 = all clients/round, <1 = sampled

attack:
  type: scale
  scale_factor: 3.0
  start_round: 20         # clean rounds 0-19, attack activates at round 20

aggregation:
  type: flame
  params:
    noise_mult: 0.01
    delta: 1.0e-5
    min_cluster_size: 2

output_dir: ./results
device: auto
seed: 42
