dataset:
  name: mnist
  split:
    mode: dirichlet
    alpha: 0.3            # non-IID — harder setting

model:
  name: mlp
  hidden_size: 100

topology:
  n_nodes: 20
  n_attackers: 8          # 40% Byzantine
  n_neighbors: 10
  seed: 42

training:
  n_rounds: 150
  local_epochs: 1
  batch_size: 64
  lr: 0.01
  n_workers: 5

dp:
  noise_mode: per_step
  clip_bound: 2.0
  noise_mult: 1.1
  delta: 1.0e-5
  epsilon_max: 100000000.0
  accountant: renyi_dpsgd
  accountant_params:
    alpha_list: [1.01, 1.05, 1.1, 1.25, 1.5, 1.75, 2, 2.5, 3, 4, 5, 6, 8, 10, 12, 16, 20, 32, 50, 64, 100, 128, 256, 512, 1000]

attack:
  type: scale
  scale_factor: 3.0       # standardized (was 5.0 in base config)
  start_round: 20         # clean rounds 0-19, attack activates at round 20

aggregation:
  type: kurtosis_avg
  params:
    centered: false
    confidence: 2.58

output_dir: ./results
device: auto
seed: 42
