dataset:
  name: mnist
  split:
    mode: iid
    samples_per_node: 1200    # each node draws 3000 random samples from 60k pool (overlap)
    alpha: 1.0                # ignored in iid mode

model:
  name: mlp
  hidden_size: 100

topology:
  n_nodes: 50
  n_attackers: 0          # 40% Byzantine
  n_neighbors: 30
  seed: 42

training:
  n_rounds: 100
  local_epochs: 1
  batch_size: 64
  lr: 0.001
  n_workers: 5

dp:
  noise_mode: none        # No DP — plain Krum defense only
  sampling_rate: 1.0  # Poisson client subsampling: 1.0 = all clients/round, <1 = sampled

attack:
  type: scale
  scale_factor: -10.0
  start_round: 20         # clean rounds 0-19, attack activates at round 20

aggregation:
  type: krum
  params:
    n_attackers: 4        # expected Byzantine per neighborhood (~40% of 10 neighbors)
    multi_k: 1

output_dir: ./results
device: auto
seed: 42
