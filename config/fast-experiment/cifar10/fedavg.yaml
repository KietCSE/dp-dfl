dataset:
  name: cifar10
  split:
    mode: iid

model:
  name: cnn
  hidden_size: 128

topology:
  n_nodes: 20
  n_attackers: 8          # 40% Byzantine
  n_neighbors: 10
  seed: 42

training:
  n_rounds: 100
  local_epochs: 1
  batch_size: 64
  lr: 0.01
  n_workers: 5

dp:
  noise_mode: none        # No DP — plain FedAvg

attack:
  type: scale
  scale_factor: 3.0
  start_round: 20         # clean rounds 0-19, attack activates at round 20

aggregation:
  type: fedavg                # FedAvg = weighted average by dataset proportion
  params: {}

output_dir: ./results
device: auto
seed: 42
