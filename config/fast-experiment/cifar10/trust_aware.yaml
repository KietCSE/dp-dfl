dataset:
  name: cifar10
  split:
    mode: iid

model:
  name: cnn
  hidden_size: 128

topology:
  n_nodes: 20
  n_attackers: 4          # 20% Byzantine
  n_neighbors: 10
  seed: 42

training:
  n_rounds: 100
  local_epochs: 1
  batch_size: 64
  lr: 0.01
  n_workers: 1

dp:
  noise_mode: none            # D2B-DP injects per-layer noise itself (Step 3)
  delta: 1.0e-5
  epsilon_max: 100000000.0
  accountant: renyi_dpsgd
  accountant_params:
    alpha_list: [1.01, 1.05, 1.1, 1.25, 1.5, 1.75, 2, 2.5, 3, 4, 5, 6, 8, 10, 12, 16, 20, 32, 50, 64, 100, 128, 256, 512, 1000]
  sampling_rate: 1.0

attack:
  type: scale
  scale_factor: -10.0
  start_round: 20

aggregation:
  type: trust_aware_d2b
  params: {}

trust:
  k: 5
  bound_k: 3.0
  rho_min: 0.1
  rho_max: 1.0
  beta: 0.05
  theta: 1.1
  gamma: 2.5
  kappa: 5.0
  alpha_T: 0.85
  trust_init: 1.0
  T_min: 0.3
  beta_soft: 3.0
  beta_m: 0.9
  eta_global: 0.01

output_dir: ./results
device: auto
seed: 42
