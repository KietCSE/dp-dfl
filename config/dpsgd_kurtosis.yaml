dataset:
  name: mnist
  split:
    mode: iid
    alpha: 0.5

model:
  name: mlp
  hidden_size: 100

topology:
  n_nodes: 20
  n_attackers: 4
  n_neighbors: 10
  seed: 42

training:
  n_rounds: 30
  local_epochs: 1
  batch_size: 64
  lr: 0.01
  n_workers: 5          # thread pool size (1 = sequential, 5 = 5 nodes train song song)

dp:
  noise_mode: per_step   # "per_step" | "post_training" | "none"
  clip_bound: 2.0
  noise_mult: 1.1
  delta: 1.0e-5
  epsilon_max: 10.0
  accountant: renyi_dpsgd
  accountant_params:
    alpha_list: [1.01, 1.05, 1.1, 1.25, 1.5, 1.75, 2, 2.5, 3, 4, 5, 6, 8, 10, 12, 16, 20, 32, 50, 64, 100, 128, 256, 512, 1000]
  sampling_rate: 1.0  # Poisson client subsampling: 1.0 = all clients/round, <1 = sampled

attack:
  type: scale
  scale_factor: 5.0

aggregation:
  type: kurtosis_avg
  params:
    centered: false
    confidence: 2.58

output_dir: ./results
device: auto    # "cpu", "cuda", or "auto" (auto-detect GPU)
seed: 42
