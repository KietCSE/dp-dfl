attack:
  type: scale
  scale_factor: -5.0

aggregation:
    type: krum
    params: 
      n_attackers: 10  # MUST match topology.n_attackers
      multi_k: 1

noise_game:
  alpha_attack: 0.1 # MNIST: directional noise weight
  sigma_0: 1.0 # MNIST: initial noise scale
  svd_rank: 16 # truncated SVD rank (giữ nguyên)
  svd_reshape_k: 64 # reshape gradient for SVD (giữ nguyên)
  momentum_beta: 0.9 # MNIST: momentum decay
  ema_gamma: 0.9 # MNIST: EMA denoising factor
  anneal_kappa: 0.01 # MNIST: noise annealing decay
  align_tau: 0.2 # MNIST: gradient alignment threshold
  scaffold: true # SCAFFOLD variance reduction
  two_track: true # two-track model (clean + robust)
  two_track_lambda: 0.7 # clean model weight
  beta_strat: 0.3 # MNIST: strategic/DP noise coupling ratio
  sigma_total: 2.0 # MNIST: total noise energy cap
  rdp_alpha: 2.0 # Renyi order for internal budget tracking
  nsr_warn: 5.0 # NSR warning threshold

output_dir: results
seed: 42
