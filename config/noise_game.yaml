dataset:
  name: mnist
  split:
    mode: iid
    alpha: 0.5

model:
  name: mlp
  hidden_size: 100

topology:
  n_nodes: 20
  n_attackers: 4
  n_neighbors: 10
  seed: 42

training:
  n_rounds: 50
  local_epochs: 1
  batch_size: 64
  lr: 0.01
  n_workers: 1

dp:
  noise_mode: none # noise-game self-manages strategic noise injection
  clip_bound: 1.0 # MNIST: C=1.0
  delta: 1.0e-5 # used by NoiseGameMechanism + accountant
  epsilon_max: 60 # MNIST: epsilon=5-10
