dataset:
  name: cifar10
  split:
    mode: iid
    alpha: 0.5

model:
  name: cnn
  hidden_size: 128

topology:
  n_nodes: 20
  n_attackers: 4
  n_neighbors: 10
  seed: 42

training:
  n_rounds: 200
  local_epochs: 1
  batch_size: 64
  lr: 0.01
  n_workers: 5

dp:
  noise_mode: none            # No DP — plain FedAvg

attack:
  type: scale
  scale_factor: 3.0
  start_round: 0

aggregation:
  type: fedavg                # FedAvg = weighted average by dataset proportion
  params: {}

output_dir: ./results
seed: 42
