dataset:
  name: cifar10
  split:
    mode: iid
    alpha: 0.5

model:
  name: cnn
  hidden_size: 128

topology:
  n_nodes: 20
  n_attackers: 4
  n_neighbors: 10
  seed: 42

training:
  n_rounds: 200
  local_epochs: 1
  batch_size: 64
  lr: 0.01
  n_workers: 1

dp:
  noise_mode: none            # trust-aware self-manages per-neighbor bounded Gaussian noise
  delta: 1.0e-5               # used by PerNeighborRDPAccountant
  epsilon_max: 10.0           # used by PerNeighborRDPAccountant
  accountant_params:
    alpha_list: [1.25, 1.5, 2, 3, 5, 10, 20, 50, 100]

attack:
  type: scale
  scale_factor: 3.0
  start_round: 0

aggregation:
  type: trust_aware_d2b
  params: {}

trust:
  trust_init: 0.5
  ema_lambda: 0.8
  rho_min: 0.1
  rho_max: 5.0
  beta: 0.01
  gamma_penalty: 0.5
  gamma_z: 3.0
  sigma_floor_z: 0.0001
  alpha_drop: 2.0
  sigma_floor_drop: 0.001
  clip_window: 3
  temporal_window: 5
  eta: 0.1

output_dir: ./results
device: auto
seed: 42
