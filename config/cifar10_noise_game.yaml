dataset:
  name: cifar10
  split:
    mode: iid
    alpha: 0.5

model:
  name: cnn
  hidden_size: 128

topology:
  n_nodes: 20
  n_attackers: 4
  n_neighbors: 10
  seed: 42

training:
  n_rounds: 200
  local_epochs: 1
  batch_size: 64
  lr: 0.01
  n_workers: 1

dp:
  noise_mode: none # noise-game self-manages strategic noise injection
  clip_bound: 2.0 # used by NoiseGameMechanism
  delta: 1.0e-5 # used by NoiseGameMechanism + accountant
  epsilon_max: 10.0 # used by NoiseGameMechanism
  accountant: renyi_dpsgd # used for RDP accounting
  accountant_params:
    alpha_list: [1.01, 1.05, 1.1, 1.25, 1.5, 1.75, 2, 2.5, 3, 4, 5, 6, 8, 10, 12, 16, 20, 32, 50, 64, 100, 128, 256, 512, 1000]

attack:
  type: scale
  scale_factor: 3.0
  start_round: 0

aggregation:
  type: krum
  params: {}

noise_game:
  alpha_attack: 0.5
  sigma_0: 1.0
  svd_rank: 16
  svd_reshape_k: 64
  momentum_beta: 0.9
  ema_gamma: 0.9
  anneal_kappa: 0.02
  align_tau: 0.1
  scaffold: true
  two_track: true
  two_track_lambda: 0.7
  beta_strat: 0.5
  sigma_total: 3.0
  rdp_alpha: 2.0
  nsr_warn: 5.0

output_dir: ./results
seed: 42
