# DFL DP-FedAvg standard baseline ?~@~T utility experiment under no-attack scenario.

dataset:
  name: emnist_digits
  split:
    mode: iid
    samples_per_node: 7000
    alpha: 1.0

model:
  name: mlp
  hidden_size: 32

topology:
  n_nodes: 50
  n_attackers: 0
  n_neighbors: 20
  seed: 42

training:
  n_rounds: 300
  local_epochs: 1
  batch_size: 64
  lr: 0.01
  n_workers: 5
  use_vectorized: true
  vmap_chunk: 0

dp:
  noise_mode: post_training
  clip_bound: 0.0234
  noise_mult: 0.9             # gives ε?~I~H16 over 50 rounds
  delta: 1.0e-5
  epsilon_max: 1000
  accountant: renyi_dpsgd
  accountant_params:
    alpha_list: [1.01, 1.05, 1.1, 1.25, 1.5, 1.75, 2, 2.5, 3, 4, 5, 6, 8, 10, 12, 16, 20, 32, 50, 64, 100, 128, 256, 512, 1000]
  sampling_rate: 0.5

attack:
  type: scale
  scale_factor: -10.0
  start_round: 99999            # never activates ?~@~T utility-only run

aggregation:
  type: fedavg
  params: {}

output_dir: ./results
device: auto
seed: 42