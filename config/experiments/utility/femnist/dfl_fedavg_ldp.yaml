# DFL DP-FedAvg standard baseline — utility experiment under no-attack scenario.

dataset:
  name: femnist
  split:
    mode: iid
    samples_per_node: 10000
    alpha: 1.0

model:
  # Options for FEMNIST (62-class EMNIST byclass):
  #   tiny_cnn  ~8k params,  hidden_size 32   ?~@~T best DP safety, ~75-80% acc, slowest forward
  #   lenet5    ~66k params, hidden_size 120  ?~@~T recommended, 82-86% acc, balanced speed
  #   mlp       ~170k params, hidden_size 200 ?~@~T high D, noise variance risk
  name: lenet5
  hidden_size: 120

topology:
  n_nodes: 300
  n_attackers: 0
  n_neighbors: 150
  seed: 42

training:
  n_rounds: 100
  local_epochs: 1
  batch_size: 64
  lr: 0.01
  n_workers: 5
  use_vectorized: true
  vmap_chunk: 0

dp:
  noise_mode: post_training
  clip_bound: 0.0234
  noise_mult: 1.45              # gives ε≈16 over 50 rounds
  delta: 1.0e-5
  epsilon_max: 16.5
  accountant: renyi_dpsgd
  accountant_params:
    alpha_list: [1.01, 1.05, 1.1, 1.25, 1.5, 1.75, 2, 2.5, 3, 4, 5, 6, 8, 10, 12, 16, 20, 32, 50, 64, 100, 128, 256, 512, 1000]
  sampling_rate: 0.1

attack:
  type: scale
  scale_factor: -10.0
  start_round: 99999            # never activates — utility-only run

aggregation:
  type: fedavg
  params: {}

output_dir: ./results
device: auto
seed: 42
