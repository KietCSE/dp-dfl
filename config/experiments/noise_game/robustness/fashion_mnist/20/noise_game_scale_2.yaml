name: noise_game_scale_v2_20pct_fashion_mnist

dataset:
  name: fashion_mnist
  split:
    mode: iid
    samples_per_node: 1000
    alpha: 1.0
model:
  name: mlp
  hidden_size: 64
topology:
  n_nodes: 500
  n_attackers: 100
  n_neighbors: 200
  seed: 42
training:
  n_rounds: 150
  local_epochs: 1
  batch_size: 64
  lr: 0.01
  n_workers: 5
  use_vectorized: true
  vmap_chunk: 0
dp:
  noise_mode: none # noise-game self-manages strategic noise injection
  clip_bound: 1.0
  delta: 1.0e-5
  epsilon_max: 8.0
  accountant_params:
    alpha_list:
      - 1.01
      - 1.05
      - 1.1
      - 1.25
      - 1.5
      - 1.75
      - 2
      - 2.5
      - 3
      - 4
      - 5
      - 6
      - 8
      - 10
      - 12
      - 16
      - 20
      - 32
      - 50
      - 64
      - 100
      - 128
      - 256
      - 512
      - 1000
  sampling_rate: 0.05
attack:
  type: scale
  scale_factor: -10
  start_round: 50
aggregation:
  type: krum
  params:
    n_attackers: 100
    multi_k: 1
noise_game:
  alpha_attack: 0.1
  sigma_0: 1.0
  svd_rank: 32
  svd_reshape_k: 64
  momentum_beta: 0.95
  ema_gamma: 0.95
  anneal_kappa: 0.01
  align_tau: 0.6
  scaffold: false
  two_track: false
  two_track_lambda: 0.7
  beta_strat: 0.04
  sigma_total: 0.5
  nsr_warn: 20000.0
output_dir: ./results/noise_game/robustness/fashion_mnist/20/noise_game_scale_2
device: auto
seed: 42
