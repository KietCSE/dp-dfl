dataset:
  name: mnist
  split:
    mode: iid
    alpha: 0.5

model:
  name: mlp
  hidden_size: 100

topology:
  n_nodes: 20
  n_attackers: 4
  n_neighbors: 10
  seed: 42

training:
  n_rounds: 100
  local_epochs: 1
  batch_size: 64
  lr: 0.01
  n_workers: 5

dp:
  noise_mode: post_training    # User-level DP: train SGD → clip final update → noise
  clip_bound: 2.0
  noise_mult: 1.1
  delta: 1.0e-5
  epsilon_max: 10.0
  accountant: renyi_dpsgd
  accountant_params:
    alpha_list: [1.01, 1.05, 1.1, 1.25, 1.5, 1.75, 2, 2.5, 3, 4, 5, 6, 8, 10, 12, 16, 20, 32, 50, 64, 100, 128, 256, 512, 1000]
  sampling_rate: 1.0  # Poisson client subsampling: 1.0 = all clients/round, <1 = sampled

attack:
  type: scale
  scale_factor: 3.0
  start_round: 0

aggregation:
  type: fedavg                # FedAvg = weighted average by dataset proportion
  params: {}

output_dir: ./results
seed: 42
