dataset:
  name: mnist
  split:
    mode: iid
    alpha: 0.5

model:
  name: mlp
  hidden_size: 100

topology:
  n_nodes: 20
  n_attackers: 4
  n_neighbors: 10
  seed: 42

training:
  n_rounds: 50
  local_epochs: 1
  batch_size: 64
  lr: 0.01
  n_workers: 1

dp:
  noise_mode: none            # noise-game handles all noise injection
  clip_bound: 2.0
  noise_mult: 1.1             # used for RDP accounting reference
  delta: 1.0e-5
  epsilon_max: 10.0
  accountant: renyi_dpsgd
  accountant_params:
    alpha_list: [1.25, 1.5, 2, 3, 5, 10, 20, 50, 100]

attack:
  type: scale
  scale_factor: 3.0

aggregation:
  type: kurtosis_avg
  params:
    centered: false
    confidence: 1.96

noise_game:
  alpha_attack: 0.5           # directional noise weight
  sigma_0: 1.0                # initial noise scale
  svd_rank: 16                # truncated SVD rank
  svd_reshape_k: 64           # reshape gradient for SVD
  momentum_beta: 0.9          # momentum decay
  ema_gamma: 0.9              # EMA denoising factor
  anneal_kappa: 0.02          # noise annealing decay
  align_tau: 0.1              # gradient alignment threshold
  scaffold: true              # SCAFFOLD variance reduction
  two_track: true             # two-track model (clean + robust)
  two_track_lambda: 0.7       # clean model weight

output_dir: results
seed: 42
