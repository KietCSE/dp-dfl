aggregation:
  centered: false
  confidence: 1.96
  type: kurtosis_avg
attack:
  scale_factor: 3.0
  type: scale
dataset:
  name: mnist
  split:
    alpha: 0.5
    mode: iid
device: auto
dp:
  alpha_list:
  - 1.25
  - 1.5
  - 2
  - 3
  - 5
  - 10
  - 20
  - 50
  - 100
  clip_bound: 2.0
  delta: 1.0e-05
  epsilon_max: 10.0
  noise_mult: 1.1
model:
  hidden_size: 100
  name: mlp
output_dir: dpfl/results
seed: 42
topology:
  n_attackers: 4
  n_neighbors: 10
  n_nodes: 20
  seed: 42
training:
  batch_size: 32
  local_epochs: 1
  lr: 0.1
  n_rounds: 5
